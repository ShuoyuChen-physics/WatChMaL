epochs: 50

val_interval: 1000
num_val_batches: 64

checkpointing: False

data_loaders:
  train:
    split_key: train_idxs
    batch_size: 4
    num_workers: 4
    # pre_transforms:
    #   - random_reflections
  validation:
    split_key: val_idxs
    batch_size: 4
    num_workers: 4
    drop_last: true